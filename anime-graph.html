type":"ES DE GÉNERO"},{"source":"Reincarnated as a Sword Season 2","target":"C2C","type":"PRODUCIDO POR"},{"source":"Reincarnated as a Sword Season 2","target":"Action","type":"ES DE GÉNERO"},{"source":"Reincarnated as a Sword Season 2","target":"Adventure","type":"ES DE GÉNERO"},{"source":"Reincarnated as a Sword Season 2","target":"Fantasy","type":"ES DE GÉNERO"},{"source":"Made in Abyss: Mezameru Shinpi","target":"Kinema Citrus","type":"PRODUCIDO POR"},{"source":"Made in Abyss: Mezameru Shinpi","target":"Adventure","type":"ES DE GÉNERO"},{"source":"Made in Abyss: Mezameru Shinpi","target":"Drama","type":"ES DE GÉNERO"},{"source":"Made in Abyss: Mezameru Shinpi","target":"Fantasy","type":"ES DE GÉNERO"},{"source":"Made in Abyss: Mezameru Shinpi","target":"Mystery","type":"ES DE GÉNERO"},{"source":"Made in Abyss: Mezameru Shinpi","target":"Sci-Fi","type":"ES DE GÉNERO"},{"source":"Blue Box Season 2","target":"Electric Circus","type":"PRODUCIDO POR"},{"source":"Blue Box Season 2","target":"Romance","type":"ES DE GÉNERO"},{"source":"Blue Box Season 2","target":"Sports","type":"ES DE GÉNERO"},{"source":"Blue Box Season 2","target":"Shounen","type":"DIRIGIDO A"},{"source":"The Apothecary Diaries Movie","target":"Drama","type":"ES DE GÉNERO"},{"source":"The Apothecary Diaries Movie","target":"Mystery","type":"ES DE GÉNERO"},{"source":"The Detective Is Already Dead Season 2","target":"ENGI","type":"PRODUCIDO POR"},{"source":"The Detective Is Already Dead Season 2","target":"Comedy","type":"ES DE GÉNERO"},{"source":"The Detective Is Already Dead Season 2","target":"Mystery","type":"ES DE GÉNERO"},{"source":"The Detective Is Already Dead Season 2","target":"Romance","type":"ES DE GÉNERO"},{"source":"Tokyo Revengers: Santen Sensou-hen","target":"LIDENFILMS","type":"PRODUCIDO POR"},{"source":"Tokyo Revengers: Santen Sensou-hen","target":"Action","type":"ES DE GÉNERO"},{"source":"Tokyo Revengers: Santen Sensou-hen","target":"Drama","type":"ES DE GÉNERO"},{"source":"Tokyo Revengers: Santen Sensou-hen","target":"Shounen","type":"DIRIGIDO A"},{"source":"Rascal Does Not Dream of a Dear Friend","target":"CloverWorks","type":"PRODUCIDO POR"},{"source":"Rascal Does Not Dream of a Dear Friend","target":"Drama","type":"ES DE GÉNERO"},{"source":"Rascal Does Not Dream of a Dear Friend","target":"Romance","type":"ES DE GÉNERO"},{"source":"Rascal Does Not Dream of a Dear Friend","target":"Supernatural","type":"ES DE GÉNERO"}]}).links;

const nodes = RAW_DATA.nodes.map(d => ({...d}));
const links = RAW_DATA.links.map(d => ({...d}));

const color = d3.scaleOrdinal()
  .domain(["Anime","Estudio","Genero","Demografia"])
  .range(["#4e79a7","#f28e2b","#59a14f","#e15759"]);

const generos     = [...new Set(nodes.filter(d=>d.type==="Genero").map(d=>d.id))].sort();
const demografias = [...new Set(nodes.filter(d=>d.type==="Demografia").map(d=>d.id))].sort();
const estudios    = [...new Set(nodes.filter(d=>d.type==="Estudio").map(d=>d.id))].sort();
const animes      = [...new Set(nodes.filter(d=>d.type==="Anime").map(d=>d.id))].sort();

const generoColor = d3.scaleOrdinal(d3.schemeTableau10).domain(generos);

// populate selects
function populate(selId, items) {
  const sel = document.getElementById(selId);
  items.forEach(item => {
    const opt = document.createElement("option");
    opt.value = item; opt.textContent = item;
    sel.appendChild(opt);
  });
}
populate("sel-genero", generos);
populate("sel-demog", demografias);
populate("sel-estudio", estudios);
populate("sel-anime", animes);

// Género positions
const W = window.innerWidth, H = window.innerHeight - 80;
const CX = W/2, CY = H/2, RAD = Math.min(W,H)*0.32;
const generoPos = {};
generos.forEach((g,i) => {
  const angle = (i/generos.length)*2*Math.PI - Math.PI/2;
  generoPos[g] = { x: CX + RAD*Math.cos(angle), y: CY + RAD*Math.sin(angle) };
});

// Primary genre per anime
const animePrimaryGenero = {};
links.forEach(l => {
  const src = l.source.id || l.source;
  const tgt = l.target.id || l.target;
  if (l.type==="ES DE GÉNERO" && !animePrimaryGenero[src]) animePrimaryGenero[src]=tgt;
});

// Fix genre node positions
nodes.forEach(n => {
  if (n.type==="Genero" && generoPos[n.id]) { n.fx=generoPos[n.id].x; n.fy=generoPos[n.id].y; }
});

const svg = d3.select("body").append("svg")
  .attr("width", W).attr("height", H)
  .attr("style","display:block;background:#1a1a2e;");

const g = svg.append("g");

svg.call(d3.zoom().scaleExtent([0.15,8]).on("zoom", e=>g.attr("transform",e.transform)));

// Género background labels
const generoLabels = g.append("g").selectAll("text")
  .data(generos).join("text")
  .text(d=>d)
  .attr("x", d=>generoPos[d].x).attr("y", d=>generoPos[d].y-18)
  .attr("text-anchor","middle").attr("font-size",12).attr("font-weight","bold")
  .attr("fill", d=>generoColor(d)).attr("opacity",0.65).attr("pointer-events","none");

const simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d=>d.id).distance(40).strength(0.3))
  .force("charge", d3.forceManyBody().strength(-60))
  .force("collide", d3.forceCollide(10))
  .force("cluster", alpha => {
    nodes.forEach(n => {
      if (n.type!=="Anime") return;
      const gen = animePrimaryGenero[n.id];
      if (!gen||!generoPos[gen]) return;
      n.vx += (generoPos[gen].x - n.x)*alpha*0.8;
      n.vy += (generoPos[gen].y - n.y)*alpha*0.8;
    });
  });

const linkSel = g.append("g").selectAll("line")
  .data(links).join("line")
  .attr("stroke","#ffffff11").attr("stroke-width",1);

const nodeSel = g.append("g").selectAll("circle")
  .data(nodes).join("circle")
  .attr("r", d=>d.type==="Anime"?5:d.type==="Genero"?12:8)
  .attr("fill", d=>{
    if (d.type==="Anime") return generoColor(animePrimaryGenero[d.id])||color("Anime");
    return color(d.type);
  })
  .attr("opacity",0.85)
  .call(d3.drag()
    .on("start",(e,d)=>{if(!e.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
    .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on("end",(e,d)=>{if(!e.active)simulation.alphaTarget(0);if(d.type!=="Genero"){d.fx=null;d.fy=null;}}));

const tooltip = document.getElementById("tooltip");
nodeSel
  .on("mouseover",(e,d)=>{
    tooltip.style.opacity=1;
    tooltip.innerHTML=`<strong>${d.id}</strong><br/>${d.type}`+
      (d.score?`<br/>Score: ${d.score}`:"")+
      (d.miembros?`<br/>Miembros: ${Number(d.miembros).toLocaleString()}`:"");
  })
  .on("mousemove",e=>{tooltip.style.left=(e.clientX+12)+"px";tooltip.style.top=(e.clientY-28)+"px";})
  .on("mouseout",()=>tooltip.style.opacity=0);

const hubLabels = g.append("g").selectAll("text")
  .data(nodes.filter(d=>d.type!=="Anime"&&d.type!=="Genero")).join("text")
  .text(d=>d.id).attr("font-size",9).attr("fill","#aaa").attr("dx",10).attr("dy",3)
  .attr("pointer-events","none");

simulation.on("tick",()=>{
  linkSel.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  nodeSel.attr("cx",d=>d.x).attr("cy",d=>d.y);
  hubLabels.attr("x",d=>d.x).attr("y",d=>d.y);
});

const counter = document.getElementById("counter");

function update() {
  const gF=document.getElementById("sel-genero").value;
  const dF=document.getElementById("sel-demog").value;
  const eF=document.getElementById("sel-estudio").value;
  const aF=document.getElementById("sel-anime").value;

  const animeLinks = {};
  links.forEach(l=>{
    const src=l.source.id||l.source; const tgt=l.target.id||l.target;
    if(!animeLinks[src]) animeLinks[src]=[];
    animeLinks[src].push(tgt);
  });

  const visibleAnimes = new Set(
    nodes.filter(n=>n.type==="Anime").filter(n=>{
      const tgts=animeLinks[n.id]||[];
      if(aF&&n.id!==aF) return false;
      if(gF&&!tgts.includes(gF)) return false;
      if(dF&&!tgts.includes(dF)) return false;
      if(eF&&!tgts.includes(eF)) return false;
      return true;
    }).map(n=>n.id)
  );

  const visibleHubs = new Set();
  links.forEach(l=>{
    const src=l.source.id||l.source; const tgt=l.target.id||l.target;
    if(visibleAnimes.has(src)) visibleHubs.add(tgt);
  });

  const isVis = d=>d.type==="Anime"?visibleAnimes.has(d.id):visibleHubs.has(d.id);

  nodeSel
    .attr("opacity",d=>isVis(d)?0.85:0.04)
    .attr("r",d=>isVis(d)?(d.type==="Anime"?5:d.type==="Genero"?12:8):2);
  linkSel.attr("opacity",l=>visibleAnimes.has(l.source.id||l.source)?0.3:0.01);
  hubLabels.attr("opacity",d=>visibleHubs.has(d.id)?1:0.04);
  generoLabels.attr("opacity",d=>!gF||d===gF?0.65:0.1);
  counter.textContent=`${visibleAnimes.size} anime${visibleAnimes.size!==1?"s":""}`;
}

["sel-genero","sel-demog","sel-estudio","sel-anime"].forEach(id=>{
  document.getElementById(id).addEventListener("change",update);
});
document.getElementById("reset-btn").addEventListener("click",()=>{
  ["sel-genero","sel-demog","sel-estudio","sel-anime"].forEach(id=>{
    document.getElementById(id).value="";
  });
  update();
});

update();
</script>
